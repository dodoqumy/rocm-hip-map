# === 全局配置 ===
settings:
  user_agent: "rocm-hip-map/0.2 (+https://github.com/{your-repo}; contact: {your-email})"
  
  # 速率限制 (每域名每秒请求数)
  rate_limit: 1.0
  
  # 重试配置
  max_retries: 3
  retry_delay: 60
  
  # 发现策略优先级
  discovery_order:
    - sitemap
    - sphinx_nav
    - github_docs
    - rss
  
  # 跳过模式
  skip_path_patterns:
    - "/_images/"
    - "/_static/"
    - "/_sources/"
    - "/genindex"
    - "/search.html"
    - "/404."
    - ".(?:png|jpg|jpeg|gif|svg|webp|css|js|woff2?|ttf)$"