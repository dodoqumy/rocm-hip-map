name: Sync GPU Prices

# Phase 10.7 — 每周一 03:00 UTC 抓取全球 GPU 二手价格
# 按国家并行拆分：US/DE/UK 同时抓取，归一化等待全部完成后执行

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday 03:00 UTC
  workflow_dispatch:      # Manual trigger

permissions:
  contents: write

jobs:
  # ── 并行抓取各国价格 ──
  fetch:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site: [EBAY-US, EBAY-DE, EBAY-UK]
      max-parallel: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch ${{ matrix.site }}
        env:
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
        run: python3 scripts/fetch-prices-ebay.py --site ${{ matrix.site }}

  # ── 归一化 + 生成前端数据 + 提交（等待全部抓取完成） ──
  normalize:
    needs: fetch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Normalize prices
        run: python3 scripts/normalize-prices.py

      - name: Generate latest price snapshot
        run: |
          python3 -c "
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          prices_dir = Path('data/prices')
          norm_files = sorted(prices_dir.glob('prices-*-normalized.json'), reverse=True)
          if norm_files:
              with open(norm_files[0]) as f:
                  data = json.load(f)
              data['updated'] = datetime.now(timezone.utc).isoformat()
              with open(prices_dir / 'prices-latest.json', 'w') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
              print(f'✅ prices-latest.json generated from {norm_files[0].name}')
          else:
              print('⚠ No normalized price data found')
          "

      - name: Commit price updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices/
          if git diff --staged --quiet; then
            echo "No price changes"
          else
            git commit -m "data: weekly GPU price update ($(date +%Y-W%V))"
            git push origin main
          fi
