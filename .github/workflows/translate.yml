name: Translate Content

# 🌐 增量翻译 — 每天定时运行，每次最多翻译 5 篇新文章
# 断点续传：_zh.md 存在且 >200B 则跳过，<200B 视为失败重新翻译
#
# 设计原则：
#   - 与 sync.yml 解耦，独立运行，互不阻塞
#   - 增量模式：每次仅翻译新增/失败的 N 篇
#   - 超时安全：单次最多 ~30min（5 篇 × 5min/篇）

on:
  schedule:
    # 每天 UTC 04:00（北京时间 12:00）
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      max_files:
        description: '每次翻译篇数（0=不设限）'
        required: false
        default: '10'
      model:
        description: '翻译模型'
        required: false
        default: 'deepseek-v4-flash'
      base_url:
        description: 'API 端点'
        required: false
        default: 'https://api.deepseek.com'
      mode:
        description: '翻译模式'
        required: false
        default: 'doc'
        type: choice
        options:
          - doc
          - paper

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Incremental translate
        env:
          TRANSLATE_PROVIDER: opencode
          TRANSLATE_API_KEY: ${{ secrets.TRANSLATE_API_KEY }}
          TRANSLATE_MODEL: ${{ inputs.model || 'deepseek-v4-flash' }}
          TRANSLATE_BASE_URL: ${{ inputs.base_url || 'https://api.deepseek.com' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python3 scripts/translate.py \
            --incremental \
            --max-files "${{ inputs.max_files || '5' }}" \
            --mode "${{ inputs.mode || 'doc' }}" \
            --commit-per-file

      - name: Audit translations
        run: python3 scripts/audit_translations.py
