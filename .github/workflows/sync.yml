name: Sync Content

on:
  schedule:
    # 每天 UTC 00:00（北京时间 08:00）
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -r requirements.txt

      # ──────────────────────────────────────────────
      # 1. 抓取官方文档
      # ──────────────────────────────────────────────
      - name: Fetch official docs
        run: python3 scripts/fetch-official.py

      - name: Sync GitHub Issues/PRs
        run: python3 scripts/sync-github.py

      # ──────────────────────────────────────────────
      # 2. 自动分类打标签
      # ──────────────────────────────────────────────
      - name: Auto classify
        run: python3 scripts/classify.py

      # ──────────────────────────────────────────────
      # 4. 版本更新检测
      # ──────────────────────────────────────────────
      - name: Release watch
        run: python3 scripts/release-watch.py

      # ──────────────────────────────────────────────
      # 3. 有变更则自动提交
      # ──────────────────────────────────────────────
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add content/ data/ docs/bilingual/ || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: daily sync $(date +%Y-%m-%d)"
            git push
          fi
