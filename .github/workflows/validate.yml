name: Validate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install requests pyyaml

      # ──────────────────────────────────────────────
      # 1. 检查所有引用链接是否可访问
      # ──────────────────────────────────────────────
      - name: Validate external links
        run: |
          echo "🔗 Checking external links from data/articles.json..."
          if [ -f data/articles.json ]; then
            python3 -c "
          import json, requests, sys
          with open('data/articles.json') as f:
              articles = json.load(f)
          broken = []
          for a in articles[:]:
              url = a.get('source_url', '')
              if not url:
                  continue
              try:
                  r = requests.head(url, timeout=15, allow_redirects=True)
                  if r.status_code >= 400:
                      broken.append((url, r.status_code))
              except Exception as e:
                  broken.append((url, str(e)))
          if broken:
              for url, err in broken:
                  print(f'  ❌ {url} → {err}')
              sys.exit(1)
          print('  ✅ All links reachable')
          "
          else
            echo "  ⏭ No data/articles.json — skipping link check"
          fi

      # ──────────────────────────────────────────────
      # 2. 检查 frontmatter 规范合规
      # ──────────────────────────────────────────────
      - name: Validate frontmatter
        run: |
          echo "📋 Checking frontmatter in content/raw/..."
          python3 -c "
          import os, re, yaml, sys
          errors = []
          required = ['title', 'source_url', 'source_type', 'credibility', 'lifecycle']
          for root, dirs, files in os.walk('content/raw'):
              for f in files:
                  if not f.endswith('.md'):
                      continue
                  path = os.path.join(root, f)
                  with open(path) as fh:
                      text = fh.read()
                  m = re.match(r'^---\s*\n(.*?)\n---', text, re.DOTALL)
                  if not m:
                      errors.append(f'{path}: missing frontmatter')
                      continue
                  try:
                      fm = yaml.safe_load(m.group(1))
                  except yaml.YAMLError as e:
                      errors.append(f'{path}: YAML parse error: {e}')
                      continue
                  if not isinstance(fm, dict):
                      errors.append(f'{path}: frontmatter not a dict')
                      continue
                  for field in required:
                      if field not in fm:
                          errors.append(f'{path}: missing required field \"{field}\"')
          if errors:
              for e in errors:
                  print(f'  ❌ {e}')
              sys.exit(1)
          print('  ✅ All frontmatter valid')
          "
        continue-on-error: true

      # ──────────────────────────────────────────────
      # 3. 检查 Docusaurus 构建
      # ──────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website deps
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build
