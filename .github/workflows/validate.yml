name: Validate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Validate external links (format only)
        continue-on-error: true
        run: |
          echo "🔗 Checking link format in data/articles.json..."
          if [ -f data/articles.json ]; then
            python3 -c "
          import json, sys
          with open('data/articles.json') as f:
              data = json.load(f)
          invalid = []
          for a in data.get('articles', []):
              url = a.get('source_url', '')
              if not url:
                  invalid.append(('missing', a.get('id', a.get('title', '?')), ''))
                  continue
              if not url.startswith(('http://', 'https://')):
                  invalid.append(('invalid format', a.get('id', '?'), url))
          if invalid:
              for reason, aid, url in invalid:
                  print(f'  ❌ [{reason}] {aid}: {url}')
              sys.exit(1)
          print('  ✅ All link formats valid')
          "
          else
            echo "  ⏭ No data/articles.json — skipping format check"
          fi

      - name: Validate cached images
        run: |
          echo "🖼️ Checking cached images..."
          if [ -f data/image-cache.json ]; then
            python3 -c "
          import json, os, sys
          with open('data/image-cache.json') as f:
              cache = json.load(f)
          missing = []
          for raw_path, mapping in cache.get('mappings', {}).items():
              local = mapping.get('local', '')
              if not local:
                  continue
              rel = local.replace('/img/cached/', '')
              filepath = os.path.join('website', 'static', 'img', 'cached', rel)
              if not os.path.isfile(filepath):
                  missing.append((raw_path, local, filepath))
          if missing:
              for raw_path, local, fp in missing:
                  print(f'  ❌ Missing cached file: {local} (from {raw_path})')
              sys.exit(1)
          print(f'  ✅ All {len(cache[\"mappings\"])} cached images present')
          "
          else
            echo "  ⏭ No data/image-cache.json — skipping cache check"
          fi

      - name: Validate remote images
        continue-on-error: true
        run: |
          echo "🌐 Checking remote image URLs..."
          python3 -c "
          import os, re, json, requests
          from urllib.parse import urljoin

          cached = set()
          if os.path.exists('data/image-cache.json'):
              with open('data/image-cache.json') as f:
                  cache = json.load(f)
              for mapping in cache.get('mappings', {}).values():
                  cached.add(mapping.get('source_url', ''))

          broken = []
          seen = set()
          for root, dirs, files in os.walk('content/raw'):
              for filename in files:
                  if not filename.endswith('.md'):
                      continue
                  filepath = os.path.join(root, filename)
                  with open(filepath) as fh:
                      text = fh.read()

                  page_url = None
                  fm = re.match(r'^---\s*\n(.*?)\n---', text, re.DOTALL)
                  if fm:
                      match = re.search(r'source_url:\s*\"?(.+?)\"?\s*$', fm.group(1), re.MULTILINE)
                      if match:
                          page_url = match.group(1).strip().strip('\"').strip(\"'\")

                  for image_match in re.finditer(r'!\[[^\]]*\]\(([^)]+)\)', text):
                      raw_url = image_match.group(1)
                      if raw_url.startswith('data:') or raw_url.startswith('/img/cached/'):
                          continue
                      if raw_url.startswith('http'):
                          abs_url = raw_url
                      elif page_url:
                          abs_url = urljoin(page_url, raw_url)
                      else:
                          continue

                      if abs_url in seen or abs_url in cached:
                          continue
                      seen.add(abs_url)

                      try:
                          resp = requests.head(abs_url, timeout=10, allow_redirects=True, headers={'User-Agent': 'rocm-hip-map-validator/1.0'})
                          if resp.status_code >= 400:
                              broken.append((abs_url, resp.status_code, filepath))
                      except Exception as exc:
                          broken.append((abs_url, str(exc), filepath))

          total = len(seen)
          if broken:
              for url, err, src in broken[:20]:
                  print(f'  ❌ {url} → {err} (in {src})')
              print(f'\\n  {len(broken)}/{total} remote images unreachable')
          else:
              print(f'  ✅ All {total} remote images reachable')
          "

      - name: Validate frontmatter
        continue-on-error: true
        run: |
          echo "📋 Checking frontmatter in content/raw/..."
          python3 -c "
          import os, re, yaml, sys
          errors = []
          required = ['title', 'source_url', 'source_type', 'credibility', 'lifecycle']
          for root, dirs, files in os.walk('content/raw'):
              for filename in files:
                  if not filename.endswith('.md'):
                      continue
                  filepath = os.path.join(root, filename)
                  with open(filepath) as fh:
                      text = fh.read()
                  match = re.match(r'^---\s*\n(.*?)\n---', text, re.DOTALL)
                  if not match:
                      errors.append(f'{filepath}: missing frontmatter')
                      continue
                  try:
                      fm = yaml.safe_load(match.group(1))
                  except yaml.YAMLError as exc:
                      errors.append(f'{filepath}: YAML parse error: {exc}')
                      continue
                  if not isinstance(fm, dict):
                      errors.append(f'{filepath}: frontmatter not a dict')
                      continue
                  for field in required:
                      if field not in fm:
                          errors.append(f'{filepath}: missing required field \"{field}\"')
          if errors:
              for err in errors:
                  print(f'  ❌ {err}')
              sys.exit(1)
          print('  ✅ All frontmatter valid')
          "

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website deps
        working-directory: website
        run: npm ci

      - name: Typecheck website
        working-directory: website
        run: npm run typecheck

      - name: Run frontend tests
        working-directory: website
        run: npm run test:run

      - name: Build website
        working-directory: website
        run: npm run build

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short
