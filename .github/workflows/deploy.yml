name: Deploy Docusaurus to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 显式声明写入权限（覆盖默认只读）
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # 也需要 GitHub Pages 环境权限
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build site
        working-directory: website
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

      # ── 部署前构建验证 ──
      - name: Verify build output
        run: |
          echo "🔍 Verifying build output..."
          HTML_COUNT=$(find website/build -name '*.html' | wc -l)
          echo "📊 Found $HTML_COUNT HTML files"
          if [ "$HTML_COUNT" -lt 20 ]; then
            echo "❌ Too few HTML files (< 20), build may be broken!"
            exit 1
          fi
          # 确认关键页面存在
          for page in "index.html" "docs/getting-started/index.html" "404.html"; do
            if [ -f "website/build/$page" ]; then
              echo "✅ $page exists"
            else
              echo "❌ Missing: $page"
              exit 1
            fi
          done
          echo "✅ Build output verified"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ── 部署后可达性检查 ──
      - name: Smoke test
        run: |
          echo "🔍 Checking deployed site reachability..."
          sleep 15
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "${{ steps.deployment.outputs.page_url }}")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Site returned HTTP $STATUS"
            exit 1
          fi
          echo "✅ Site reachable (HTTP 200)"
          # 检查页面标题
          TITLE=$(curl -sL "${{ steps.deployment.outputs.page_url }}" | grep -o '<title>[^<]*</title>' | head -1)
          echo "📄 Page title: $TITLE"
          if echo "$TITLE" | grep -q "ROCm"; then
            echo "✅ Homepage title verified"
          else
            echo "⚠️  Homepage title mismatch (not critical)"
          fi
          echo "✅ Smoke test passed"
